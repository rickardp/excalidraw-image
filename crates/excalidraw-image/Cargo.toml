[package]
name = "excalidraw-image"
version = "0.1.3"
edition = "2021"
license = "MIT"
description = "Convert .excalidraw scenes to SVG and PNG. Self-contained, no Node/Bun/Deno runtime required."
repository = "https://github.com/rickardp/excalidraw-image"
homepage = "https://github.com/rickardp/excalidraw-image"
keywords = ["excalidraw", "svg", "cli"]
categories = ["command-line-utilities", "graphics"]
readme = "../../README.md"
authors = ["Rickard"]
rust-version = "1.75"

# Explicit include list because `assets/core.mjs` is .gitignored — it's the
# esbuild bundle of @excalidraw/excalidraw + our shims, regenerated by
# `make core`. Without an include list cargo would skip it (gitignored)
# and the published .crate would be missing the bundle.
#
# Cargo handles the workspace-root README via the `readme` field
# automatically; no need to list it here.
include = [
    "src/**/*.rs",
    "tests/**/*.rs",
    "build.rs",
    "assets/core.mjs",
    "Cargo.toml",
]

[[bin]]
name = "excalidraw-image"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[features]
default = []
# CJK support: pulls in the Xiaolai shards via excalidraw-image-fonts-cjk.
# Covers modern Chinese, Japanese kanji, Korean Hangul Syllables, and
# common CJK punctuation/compatibility ranges (~165 shards). Without this
# feature, only Latin-script fonts are bundled, keeping the binary
# noticeably smaller for users who don't need CJK glyphs.
cjk = ["dep:excalidraw-image-fonts-cjk"]
# Long-tail CJK: CJK Extension A (historical/rare characters used in
# classical Chinese, names, dialect-specific terms), CJK Compatibility
# Ideographs, CJK Radicals, and Hangul Jamo (~44 shards, ~3 MB extra).
# Implies `cjk` — it makes no sense to ship the rare characters without
# the common ones.
cjk-full = ["cjk", "dep:excalidraw-image-fonts-cjk-extra"]

[dependencies]
# Pin deno_core to the F-002 validated version. serde_v8 is re-exported from
# deno_core in 0.399 — no separate pin needed.
deno_core = "=0.399.0"
tokio = { version = "1", features = ["rt", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
lexopt = "0.3"
# PNG-001: native PNG rasterization. resvg + tiny-skia render the SVG; usvg
# parses with a fontdb populated from the font sub-crates' raw WOFF2 bytes
# decompressed at build time.
resvg = "0.45"
usvg = "0.45"
tiny-skia = "0.11"
# Reverse + symmetric round-trip (.excalidraw.svg / .png → .excalidraw, and
# embedding the scene back into PNG output for editable round-trips):
#   base64    – SVG payload comment encoding.
#   flate2    – zlib deflate/inflate for the bstring payload.
#   crc32fast – PNG tEXt chunk CRC for the embed-into-PNG path.
# All three are already in the transitive tree via resvg/usvg; pinning them
# as direct deps means the `extract` and `embed` modules don't depend on a
# transitive that could be feature-gated away later.
base64 = "0.22"
flate2 = "1"
crc32fast = "1"
# Font byte sources, split for crates.io's per-crate size cap and for opt-in
# CJK. Always-on Latin core; CJK feature-gated.
excalidraw-image-fonts-core = { version = "1.0.0", path = "../excalidraw-image-fonts-core" }
excalidraw-image-fonts-cjk = { version = "1.0.0", path = "../excalidraw-image-fonts-cjk", optional = true }
excalidraw-image-fonts-cjk-extra = { version = "1.0.0", path = "../excalidraw-image-fonts-cjk-extra", optional = true }

[build-dependencies]
# build.rs decompresses brotli-compressed TTF for the resvg fontdb. fontdb only
# consumes raw TTF/OTF; the font sub-crates ship brotli-compressed TTF produced
# by `npm run sync-fonts`. Pure Rust — no C++ toolchain needed.
brotli = "7"
# Parse the pre-generated WOFF2 blob index (JSON from build-woff2-blob.mjs).
serde_json = "1"
# Sub-crates are also build-deps so build.rs can read FONTS arrays directly.
excalidraw-image-fonts-core = { version = "1.0.0", path = "../excalidraw-image-fonts-core" }
excalidraw-image-fonts-cjk = { version = "1.0.0", path = "../excalidraw-image-fonts-cjk", optional = true }
excalidraw-image-fonts-cjk-extra = { version = "1.0.0", path = "../excalidraw-image-fonts-cjk-extra", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }

# REL-006 — cargo-binstall metadata. Must match the tarball naming used by
# `.github/workflows/release.yml` (`excalidraw-image-<target>.tar.gz` with
# the binary at the archive root). `pkg-url` uses cargo-binstall template
# tokens: { version }, { target }, { archive-format }, { binary-ext },
# { bin }.
[package.metadata.binstall]
pkg-url = "https://github.com/rickardp/excalidraw-image/releases/download/v{ version }/excalidraw-image-{ target }.tar.gz"
pkg-fmt = "tgz"
bin-dir = "{ bin }{ binary-ext }"
