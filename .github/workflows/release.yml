# Release workflow.
#
# Triggered by pushing a `v*` tag. The tag IS the gate — no workflow_dispatch,
# no production environment, no manual approval. Whoever pushes the tag is
# the gatekeeper. Use `cargo release patch --execute` (driven by `release.toml`
# at the repo root) to bump + commit + tag + push from a workstation; CI does
# the rest.
#
# Pipeline:
#   1. verify           — tag must match crates/excalidraw-image/Cargo.toml version.
#   2. create-release   — draft GitHub Release.
#   3. publish-crate    — idempotent `cargo publish`; append crates.io link.
#   4. build-binaries   — matrix per target; upload tarball to draft release.
#   5. homebrew-bump    — render Formula/excalidraw-image.rb from template,
#                         commit to main (Pattern A, in-repo tap).
#   6. finalize-release — un-draft the release once everything succeeded.
#
# Idempotency:
#   * Re-running on the same tag is safe. cargo publish treats "already
#     uploaded" as success. Archive uploads use --clobber. Homebrew commit
#     is a no-op if SHAs haven't changed. The release stays a draft until
#     finalize succeeds, so partial failures don't ship a half-baked release.
#
# Dropped from the previous design:
#   * production environment + workflow_dispatch input — superseded by
#     tag-as-gate.
#   * HOMEBREW_TAP_TOKEN — we use the built-in GITHUB_TOKEN to commit
#     Formula/excalidraw-image.rb back to main (Pattern A, in-repo tap).
#   * Apple notarization — deferred. Users hit Gatekeeper on first run;
#     README documents `xattr -d com.apple.quarantine`. Re-add when certs
#     are configured.
#   * Linux ARM64 — deferred. The woofwoof transitive C++ build dep
#     complicates cross-compile via the `cross` crate's Docker images.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TERM_VERBOSE: false

jobs:
  verify:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n '/^\[package\]/,/^\[/p' \
              crates/excalidraw-image/Cargo.toml \
            | grep -m1 '^version' \
            | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "Tag:        $TAG"
          echo "Cargo.toml: $CARGO_VERSION"
          if [ -z "$CARGO_VERSION" ] || [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match crates/excalidraw-image/Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

  create-release:
    name: Create draft release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install JS deps
        run: npm ci
      - name: Sync bundled fonts from node_modules
        # crates/excalidraw-image-fonts-*/fonts/ is gitignored; populate
        # before publish so the .crate tarballs include the woff2s.
        run: npm run sync-fonts
      - name: Build dist/core.mjs (mirrors to crates/excalidraw-image/assets/)
        # `make core` runs build-core.mjs which writes dist/core.mjs and
        # mirrors a copy to crates/excalidraw-image/assets/core.mjs for
        # `cargo publish`. The mirror is gitignored — regenerated on every
        # build so it can't go stale.
        run: make core
      - name: Verify font fingerprints
        # Catches drift: fonts changed but version + recorded fingerprint not
        # bumped. Fails fast before any publish runs.
        run: npm run check:fonts
      - name: Publish font sub-crates (idempotent, in dep order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Font sub-crates publish before the main crate. Their version is
        # bumped manually only when fonts change; on most releases the
        # publish is a no-op ("already uploaded" treated as success).
        shell: bash
        run: |
          set -euo pipefail
          for c in excalidraw-image-fonts-core excalidraw-image-fonts-cjk excalidraw-image-fonts-cjk-extra; do
            echo "::group::publish $c"
            set +e
            out=$(cargo publish -p "$c" --allow-dirty --locked 2>&1)
            rc=$?
            set -e
            printf '%s\n' "$out"
            if [ "$rc" -ne 0 ] && ! printf '%s' "$out" | grep -qE "already (exists|uploaded)"; then
              echo "::endgroup::"
              exit "$rc"
            fi
            echo "::endgroup::"
          done
      - name: Publish main crate (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Idempotent: re-running on the same tag treats "already exists"
        # as success. Useful for partial-failure reruns.
        shell: bash
        run: |
          set +e
          output=$(cargo publish -p excalidraw-image --allow-dirty --locked 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$output"
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$output" | grep -qE "already (exists|uploaded)"; then
            echo "::notice::excalidraw-image ${GITHUB_REF_NAME#v} already on crates.io — treating as success"
            exit 0
          fi
          exit "$rc"
      - name: Append crates.io link to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          URL="https://crates.io/crates/excalidraw-image/${VERSION}"
          CURRENT=$(gh release view "$TAG" --json body -q .body)
          if printf '%s' "$CURRENT" | grep -qF "$URL"; then
            echo "::notice::crates.io link already present — skipping append"
            exit 0
          fi
          LINK="- crates.io: [\`excalidraw-image\` ${VERSION}](${URL})"
          gh release edit "$TAG" --notes "$(printf '%s\n\n%s\n' "$CURRENT" "$LINK")"

  build-binaries:
    name: Build CLI (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # macos-latest is arm64. Native build for arm64; cross-build for
          # x86_64 via the rustup target. Apple's clang handles the C++
          # toolchain (woofwoof's brotli/woff2 dep) for both archs.
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install JS deps
        run: npm ci
      - name: Sync bundled fonts from node_modules
        # crates/excalidraw-image-fonts-*/fonts/ is gitignored; populate
        # before cargo build so include_bytes! finds the woff2s.
        run: npm run sync-fonts
      - name: Build dist/core.mjs
        run: make core
      - name: Build binary
        # Ship `cjk-full` in prebuilt binaries so Homebrew/GH-Releases users
        # get every Xiaolai shard (common + long-tail) without having to
        # know about cargo features. `cargo install` users still default to
        # Latin-only and can opt into `cjk` or `cjk-full` themselves.
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p excalidraw-image --features cjk-full
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          NAME="excalidraw-image-${{ matrix.target }}"
          STAGE="staging/$NAME"
          mkdir -p "$STAGE" dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/excalidraw-image.exe" "$STAGE/"
          else
            cp "target/${{ matrix.target }}/release/excalidraw-image" "$STAGE/"
          fi
          cp README.md LICENSE "$STAGE/"
          cd staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip "../dist/${NAME}.zip" "$NAME" >/dev/null
          else
            tar -czf "../dist/${NAME}.tar.gz" "$NAME"
          fi
      - name: Upload archive to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

  homebrew-bump:
    name: Bump in-repo Homebrew formula
    # Needs build-binaries so the tarballs exist on the draft release; we
    # download them and compute SHA-256s. Pattern A: in-repo tap.
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tarballs
          gh release download "${GITHUB_REF_NAME}" -p "*.tar.gz" -D tarballs
      - name: Compute SHAs
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          read_sha() {
            shasum -a 256 "tarballs/excalidraw-image-$1.tar.gz" | awk '{print $1}'
          }
          {
            echo "darwin_arm=$(read_sha aarch64-apple-darwin)"
            echo "darwin_x86=$(read_sha x86_64-apple-darwin)"
            echo "linux_x86=$(read_sha x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_OUTPUT"
      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          mkdir -p Formula
          sed \
            -e "s|@@VERSION@@|${VERSION}|g" \
            -e "s|@@URL_DARWIN_ARM@@|${BASE_URL}/excalidraw-image-aarch64-apple-darwin.tar.gz|g" \
            -e "s|@@SHA_DARWIN_ARM@@|${{ steps.shas.outputs.darwin_arm }}|g" \
            -e "s|@@URL_DARWIN_X86@@|${BASE_URL}/excalidraw-image-x86_64-apple-darwin.tar.gz|g" \
            -e "s|@@SHA_DARWIN_X86@@|${{ steps.shas.outputs.darwin_x86 }}|g" \
            -e "s|@@URL_LINUX_X86@@|${BASE_URL}/excalidraw-image-x86_64-unknown-linux-gnu.tar.gz|g" \
            -e "s|@@SHA_LINUX_X86@@|${{ steps.shas.outputs.linux_x86 }}|g" \
            .github/templates/excalidraw-image.rb.tmpl \
            > Formula/excalidraw-image.rb
          echo "Rendered formula:"
          cat Formula/excalidraw-image.rb
      - name: Commit and push to main
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          git config --global user.email "actions@github.com"
          git config --global user.name  "github-actions[bot]"
          git add Formula/excalidraw-image.rb
          if git diff --staged --quiet; then
            echo "::notice::Formula already up to date — no commit needed"
            exit 0
          fi
          git commit -m "release: bump Homebrew formula to ${VERSION} [skip ci]"
          git push origin main

  finalize-release:
    name: Publish GitHub release
    needs: [publish-crate, build-binaries, homebrew-bump]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --draft=false
