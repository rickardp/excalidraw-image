# REL-002 / REL-003 / REL-005 / REL-006 / SZ-001 — release pipeline.
#
# Triggered on tag push `v*`. Per-OS native runners — no cross-compile.
#
# Why per-OS rather than `cross`:
#   The crate has a transitive C++ build-time dependency
#   (`woofwoof` -> Google's woff2 C++ library) used in build.rs to
#   pre-decompress WOFF2 fonts. Naive `cargo build --target=...` from a
#   single host fails to find the right C++ toolchain and headers for
#   non-host targets. The `cross` Docker images don't ship the headers
#   either. Per-OS native runners trade matrix concurrency for a build
#   that is consistently green.
#
# Linux ARM64 is intentionally deferred to v1.1: it would need either
# QEMU (slow) or `cross` with a custom Dockerfile installing the woff2
# C++ toolchain. Both add scope without a v1 user demand.
#
# This file implements:
#   REL-002 — build matrix + tarballs + GH Release
#   REL-003 — macOS codesigning + notarization (conditional on secrets)
#   REL-005 — `cargo install --path` smoke verification (post-matrix)
#   REL-006 — release tarball naming aligned with cargo-binstall metadata
#   SZ-001  — satisfied via the per-OS matrix below
#
# Manual gates:
#   * `cargo publish` runs in the `production` environment
#     (workflow_dispatch only or after explicit approval) and is skipped
#     if `CARGO_REGISTRY_TOKEN` isn't set.
#   * Homebrew formula bump commits Formula/excalidraw-image.rb back to main
#     using the built-in GITHUB_TOKEN (no extra secret required). The push
#     uses `[skip ci]` to avoid retriggering test.yml.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build, e.g. v0.1.0'
        required: true
      publish_crate:
        description: 'Run cargo publish (requires CARGO_REGISTRY_TOKEN)'
        required: false
        default: 'false'

permissions:
  contents: write   # create release + upload assets
  id-token: write   # reserved for future OIDC use (e.g. trusted publishing)

env:
  # Ensure released binaries are reproducible across hosts.
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bin_ext: ''
          - os: macos-13
            target: x86_64-apple-darwin
            bin_ext: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip leading 'v' for the file naming + binstall metadata.
          VERSION="${REF#v}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Deno 2.x
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-
            cargo-${{ runner.os }}-

      - name: npm ci
        run: npm ci

      - name: Build dist/core.mjs
        run: make core

      - name: cargo build --release --target ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }} -p excalidraw-image

      - name: Codesign + notarize macOS binary (conditional)
        # Only meaningful on macOS. Skipped silently if the cert secret
        # isn't configured. The release profile already strips symbols
        # (`strip = "symbols"` in workspace Cargo.toml), so no separate
        # strip step is needed.
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERT: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/excalidraw-image"

          if [ -z "${APPLE_DEVELOPER_ID_APPLICATION_CERT:-}" ]; then
            echo "APPLE_DEVELOPER_ID_APPLICATION_CERT not set; skipping codesign + notarize."
            {
              echo "### macOS signing (${{ matrix.target }})"
              echo ""
              echo "Skipped: Apple Developer ID secrets not configured."
              echo "Users may need: \`xattr -d com.apple.quarantine excalidraw-image\` after download."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Decode the PKCS12 cert into a temporary keychain.
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERT" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" \
            -P "${APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD:-}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # shellcheck disable=SC2046  # word-splitting is intentional: each existing keychain is a separate arg.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          IDENTITY="${APPLE_DEVELOPER_ID_APPLICATION_IDENTITY:-Developer ID Application}"
          codesign --force --options=runtime --timestamp \
            --sign "$IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"

          # Notarization needs a zip of the binary.
          NOTARY_ZIP="$RUNNER_TEMP/notary.zip"
          /usr/bin/ditto -c -k --keepParent "$BIN" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_PASSWORD" \
            --wait

          # Standalone Mach-O binaries can't be stapled (stapler only
          # works on app bundles, dmgs, and pkgs). Notarization is still
          # honored at first launch via Gatekeeper online check. We
          # attempt staple but tolerate failure.
          xcrun stapler staple "$BIN" || \
            echo "stapler staple skipped (expected for bare Mach-O)."

          # Cleanup keychain.
          security delete-keychain "$KEYCHAIN" || true
          rm -f "$CERT_PATH" "$NOTARY_ZIP"

          {
            echo "### macOS signing (${{ matrix.target }})"
            echo ""
            echo "Codesigned + notarized."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage release artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE"
          BIN_NAME="excalidraw-image${{ matrix.bin_ext }}"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "$STAGE/$BIN_NAME"
          cp LICENSE "$STAGE/LICENSE"
          cp README.md "$STAGE/README.md"
          ARCHIVE="excalidraw-image-${{ matrix.target }}.tar.gz"
          tar -C "$STAGE" -czf "$ARCHIVE" "$BIN_NAME" LICENSE README.md
          # SHA-256
          if command -v shasum >/dev/null 2>&1; then
            SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          else
            SHA=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          fi
          echo "$SHA  $ARCHIVE" > "$ARCHIVE.sha256"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          {
            echo "### Artifact (${{ matrix.target }})"
            echo ""
            echo "- File: \`$ARCHIVE\`"
            echo "- SHA-256: \`$SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            excalidraw-image-${{ matrix.target }}.tar.gz
            excalidraw-image-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  verify-cargo-install:
    # REL-005 — runs in parallel with the build matrix on a clean ubuntu
    # box. Catches situations where the crate wouldn't `cargo publish`
    # cleanly (path deps, missing files, build.rs surprises) before we
    # ship a release.
    name: verify cargo install --path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Deno 2.x
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: npm ci
        run: npm ci

      - name: Build dist/core.mjs
        run: make core

      - name: cargo install --path crates/excalidraw-image
        run: cargo install --path crates/excalidraw-image --force --locked

      - name: Smoke-test installed binary
        run: |
          set -euo pipefail
          excalidraw-image tests/fixtures/basic-shapes.excalidraw -o /tmp/out.svg
          grep '<svg' /tmp/out.svg
          echo "cargo install verification passed"

  release:
    # Aggregator: pull all artifacts, create the GH Release.
    name: github release
    needs: [build, verify-cargo-install]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          pattern: release-*
          merge-multiple: true

      - name: Show staged artifacts
        run: ls -la dist-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-release/excalidraw-image-*.tar.gz
            dist-release/excalidraw-image-*.tar.gz.sha256

  publish-crate:
    # Manual approval gate. The `production` environment is configured
    # in repo settings to require a reviewer. Skipped if no token.
    name: cargo publish
    needs: [release]
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'push' || github.event.inputs.publish_crate == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Deno 2.x
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: npm ci
        run: npm ci

      - name: Build dist/core.mjs (needed for build.rs include)
        run: make core

      - name: Mirror dist/core.mjs into crate assets/
        # `cargo publish` only packages files under the crate dir. PLAN
        # §5.9 mandates a committed mirror at
        # `crates/excalidraw-image/assets/core.mjs`. If the mirror is
        # already committed, this is a no-op; if not, we create it just
        # for the publish.
        run: |
          mkdir -p crates/excalidraw-image/assets
          cp dist/core.mjs crates/excalidraw-image/assets/core.mjs

      - name: cargo publish (dry run)
        run: cargo publish -p excalidraw-image --dry-run --allow-dirty --locked

      - name: cargo publish
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p excalidraw-image --allow-dirty --locked

      - name: Notice if no token
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "CARGO_REGISTRY_TOKEN secret not set; skipped real publish (dry-run still ran)." \
            >> "$GITHUB_STEP_SUMMARY"

  homebrew-bump:
    # Render the formula template with concrete URLs + SHAs and commit it
    # back to Formula/excalidraw-image.rb on main. Uses the built-in
    # GITHUB_TOKEN — no extra secret needed.
    #
    # Pattern A (in-repo tap): users tap this repo directly, so the formula
    # ships from the project's own main branch. Commit message includes
    # `[skip ci]` so test.yml doesn't retrigger.
    name: bump in-repo Homebrew formula
    needs: [release]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          pattern: release-*
          merge-multiple: true

      - name: Read SHAs
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          read_sha() {
            awk '{print $1}' "dist-release/excalidraw-image-$1.tar.gz.sha256"
          }
          {
            echo "darwin_arm=$(read_sha aarch64-apple-darwin)"
            echo "darwin_x86=$(read_sha x86_64-apple-darwin)"
            echo "linux_x86=$(read_sha x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          TEMPLATE=".github/templates/excalidraw-image.rb.tmpl"
          mkdir -p Formula
          sed \
            -e "s|@@VERSION@@|${VERSION}|g" \
            -e "s|@@URL_DARWIN_ARM@@|${BASE_URL}/excalidraw-image-aarch64-apple-darwin.tar.gz|g" \
            -e "s|@@SHA_DARWIN_ARM@@|${{ steps.shas.outputs.darwin_arm }}|g" \
            -e "s|@@URL_DARWIN_X86@@|${BASE_URL}/excalidraw-image-x86_64-apple-darwin.tar.gz|g" \
            -e "s|@@SHA_DARWIN_X86@@|${{ steps.shas.outputs.darwin_x86 }}|g" \
            -e "s|@@URL_LINUX_X86@@|${BASE_URL}/excalidraw-image-x86_64-unknown-linux-gnu.tar.gz|g" \
            -e "s|@@SHA_LINUX_X86@@|${{ steps.shas.outputs.linux_x86 }}|g" \
            "$TEMPLATE" > "Formula/excalidraw-image.rb"
          echo "Rendered formula:"
          cat "Formula/excalidraw-image.rb"

      - name: Commit and push to main
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          git config --global user.email "actions@github.com"
          git config --global user.name  "github-actions[bot]"
          git add Formula/excalidraw-image.rb
          if git diff --staged --quiet; then
            echo "No formula changes — already up to date."
            exit 0
          fi
          git commit -m "release: bump Homebrew formula to ${VERSION} [skip ci]"
          git push origin main
