# Tell actionlint that `macos-13` is a valid runner label. GitHub still
# supports the macos-13 image (used here as the only x86_64 macOS native
# runner — see release.yml header). Newer actionlint releases dropped it
# from the built-in label list when GH started showing deprecation
# warnings, but the runner is still scheduled and produces the right
# x86_64 binaries.
self-hosted-runner:
  labels:
    - macos-13
